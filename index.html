<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautifully designed number guessing game. Guess the secret number between 1 and 100!">
  <title>Number Guessing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="container">
    <!-- Title Section -->
    <header class="header">
      <div class="logo-icon">🎯</div>
      <h1 class="title">Guess the Number</h1>
      <p class="subtitle">I'm thinking of a number between <span class="highlight">1</span> and <span class="highlight">100</span></p>
    </header>

    <!-- Game Card -->
    <section class="game-card" id="game-card">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat" id="stat-attempts">
          <span class="stat-label">Attempts</span>
          <span class="stat-value" id="attempts-count">0</span>
        </div>
        <div class="stat" id="stat-best">
          <span class="stat-label">Best Score</span>
          <span class="stat-value" id="best-score">—</span>
        </div>
        <div class="stat" id="stat-range">
          <span class="stat-label">Range</span>
          <span class="stat-value" id="range-display">1 – 100</span>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area" id="input-area">
        <div class="input-wrapper">
          <input
            type="number"
            id="guess-input"
            class="guess-input"
            min="1"
            max="100"
            placeholder="Enter your guess"
            autocomplete="off"
          >
          <button class="guess-btn" id="guess-btn" onclick="makeGuess()">
            <span class="btn-text">Guess</span>
            <span class="btn-icon">→</span>
          </button>
        </div>
      </div>

      <!-- Feedback Area -->
      <div class="feedback-area" id="feedback-area">
        <div class="feedback-message" id="feedback-message"></div>
        <div class="hint-indicator" id="hint-indicator">
          <div class="hint-bar">
            <div class="hint-marker" id="hint-marker"></div>
            <div class="hint-zone hint-low">Too Low</div>
            <div class="hint-zone hint-target">🎯</div>
            <div class="hint-zone hint-high">Too High</div>
          </div>
        </div>
      </div>

      <!-- Guess History -->
      <div class="history-section" id="history-section">
        <h2 class="history-title">Your Guesses</h2>
        <div class="history-list" id="history-list"></div>
      </div>
    </section>

    <!-- Win Overlay -->
    <div class="win-overlay" id="win-overlay">
      <div class="win-card">
        <div class="confetti-container" id="confetti-container"></div>
        <div class="win-emoji">🎉</div>
        <h2 class="win-title">You Got It!</h2>
        <p class="win-number" id="win-number"></p>
        <p class="win-stats" id="win-stats"></p>
        <button class="play-again-btn" id="play-again-btn" onclick="resetGame()">
          <span>Play Again</span>
          <span class="btn-icon">↻</span>
        </button>
      </div>
    </div>

    <!-- New Game Button (shown after loss or for restart) -->
    <button class="new-game-btn" id="new-game-btn" onclick="resetGame()">
      New Game ↻
    </button>
  </main>

  <script src="game.js"></script>
</body>
</html>
